<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Turbo Log Comparator</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            font-size: 13px;
            color: #1e293b;
        }

        .wrap {
            max-width: 1400px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .header {
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 20px;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .file-box {
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .ctrl-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            table-layout: auto;
            min-width: 1000px;
        }

        th {
            text-align: left;
            background: #2563eb;
            color: white;
            padding: 12px;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }

        th:hover {
            background: #1d4ed8;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 12px;
            white-space: nowrap;
        }

        .func-cell {
            font-weight: bold;
            white-space: nowrap;
        }

        .diff-pos {
            color: #e11d48;
            font-weight: bold;
            background: #fff1f2;
        }

        .diff-neg {
            color: #059669;
            font-weight: bold;
            background: #ecfdf5;
        }

        .tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 8px;
            text-transform: uppercase;
            display: inline-block;
            vertical-align: middle;
        }

        .otb {
            background: #fdf2f8;
            color: #db2777;
            border: 1px solid #fbcfe8;
        }

        .custom {
            background: #f5f3ff;
            color: #7c3aed;
            border: 1px solid #ddd6fe;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        input {
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 12px;
        }

        .f-label {
            font-weight: bold;
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
        }

        #resultsArea {
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <div>
                <h2 style="margin:0">Turbo Log Comparator</h2>
                <p style="color:#64748b; margin-top:5px;">Performance Analysis & Variance Comparison</p>
            </div>
            <button id="exportBtn" class="btn btn-success" onclick="downloadComparisonCSV()" disabled>Export
                CSV</button>
        </div>

        <div class="upload-grid">
            <div class="file-box">
                <span class="f-label">Base Log:</span> <input type="file" id="logA" accept=".txt">
            </div>
            <div class="file-box">
                <span class="f-label">Target Log:</span> <input type="file" id="logB" accept=".txt">
            </div>
        </div>

        <div class="ctrl-bar">
            <div class="filter-item">
                <span class="f-label">Function:</span>
                <input type="text" id="nameFilter" placeholder="Search..." oninput="renderTable()" style="width:180px">
            </div>
            <div class="filter-item">
                <span class="f-label">Min Duration:</span>
                <input type="number" id="minDurFilter" value="0" min="0" step="0.1" oninput="renderTable()"
                    style="width:65px">
                <span class="f-label">s</span>
            </div>
            <div class="filter-item" style="margin-left:auto;">
                <button class="btn btn-primary" onclick="processLogs()">Run Comparison</button>
            </div>
        </div>

        <div id="resultsArea">
            <table id="compareTable" style="display:none;">
                <thead>
                    <tr>
                        <th onclick="sortTable('domain')">Domain ⇅</th>
                        <th onclick="sortTable('func')">Function ⇅</th>
                        <th onclick="sortTable('baseRec')">Base Rec ⇅</th>
                        <th onclick="sortTable('targetRec')">Target Rec ⇅</th>
                        <th onclick="sortTable('recVar')">Rec Δ ⇅</th>
                        <th onclick="sortTable('baseSec')">Base Time ⇅</th>
                        <th onclick="sortTable('targetSec')">Target Time ⇅</th>
                        <th onclick="sortTable('timeVar')">Time Δ ⇅</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let comparisonData = [];
        let currentSort = { key: 'timeVar', dir: 'desc' };

        async function parseLog(file) {
            const text = await file.text();
            const data = {};
            let curDom = "Unknown";
            let lastKey = null;
            let bufferedFunc = null;

            const masterRegex = /(Running transformation for (.+?)\s+\*)|(Column OTB Function\s*:\s*(\w+))|(CUSTOM FUNCTION\s*-\s*(.+?)\s*-)|(operation execution time\s*:\s*([\d:]+))|(Num rows after (.+?) operation\s*:\s*(\d+))/gi;

            const matches = text.matchAll(masterRegex);
            for (const m of matches) {
                if (m[2]) curDom = m[2].trim();
                else if (m[4]) bufferedFunc = { name: m[4].toUpperCase(), type: "OTB" };
                else if (m[6]) bufferedFunc = { name: m[6], type: "Custom" };
                else if (m[8]) {
                    if (bufferedFunc) {
                        const p = m[8].split(':');
                        const seconds = (parseInt(p[0]) * 3600) + (parseInt(p[1]) * 60) + parseFloat(p[2]);
                        lastKey = `${curDom}|${bufferedFunc.name}`;
                        data[lastKey] = { domain: curDom, func: bufferedFunc.name, type: bufferedFunc.type, seconds, records: 0 };
                        bufferedFunc = null;
                    }
                } else if (m[11] && lastKey && data[lastKey]) {
                    data[lastKey].records = parseInt(m[11]);
                }
            }
            return data;
        }

        async function processLogs() {
            const fileA = document.getElementById('logA').files[0];
            const fileB = document.getElementById('logB').files[0];
            if (!fileA || !fileB) return alert("Select both files.");

            const [dataA, dataB] = await Promise.all([parseLog(fileA), parseLog(fileB)]);
            const allKeys = new Set([...Object.keys(dataA), ...Object.keys(dataB)]);

            comparisonData = Array.from(allKeys).map(key => {
                const b = dataA[key] || { seconds: 0, records: 0 };
                const t = dataB[key] || { seconds: 0, records: 0 };
                const meta = dataB[key] || dataA[key];
                return {
                    domain: meta.domain, func: meta.func, type: meta.type,
                    baseRec: b.records, targetRec: t.records, recVar: t.records - b.records,
                    baseSec: b.seconds, targetSec: t.seconds, timeVar: t.seconds - b.seconds
                };
            });

            sortTable('timeVar', true); // Initial sort descending
            document.getElementById('exportBtn').disabled = false;
        }

        function sortTable(key, forceDesc = false) {
            if (!forceDesc) {
                currentSort.dir = (currentSort.key === key && currentSort.dir === 'desc') ? 'asc' : 'desc';
            } else {
                currentSort.dir = 'desc';
            }
            currentSort.key = key;

            comparisonData.sort((a, b) => {
                let vA = a[key];
                let vB = b[key];

                if (typeof vA === 'string') {
                    return currentSort.dir === 'desc'
                        ? vB.localeCompare(vA)
                        : vA.localeCompare(vB);
                } else {
                    // Handle numbers with null/undefined check
                    vA = vA || 0;
                    vB = vB || 0;
                    return currentSort.dir === 'desc' ? vB - vA : vA - vB;
                }
            });
            renderTable();
        }

        function renderTable() {
            const min = parseFloat(document.getElementById('minDurFilter').value) || 0;
            const search = document.getElementById('nameFilter').value.toUpperCase();
            const tbody = document.getElementById('tableBody');
            const frag = document.createDocumentFragment();

            const filtered = comparisonData.filter(r => r.targetSec >= min && r.func.toUpperCase().includes(search));

            filtered.forEach(r => {
                const tr = document.createElement('tr');
                const tCls = r.timeVar > 0.1 ? "diff-pos" : (r.timeVar < -0.1 ? "diff-neg" : "");
                const rCls = r.recVar > 0 ? "diff-pos" : (r.recVar < 0 ? "diff-neg" : "");
                tr.innerHTML = `
                    <td>${r.domain}</td>
                    <td class="func-cell"><span class="tag ${r.type.toLowerCase()}">${r.type}</span>${r.func}</td>
                    <td>${r.baseRec.toLocaleString()}</td>
                    <td>${r.targetRec.toLocaleString()}</td>
                    <td class="${rCls}">${(r.recVar >= 0 ? '+' : '') + r.recVar.toLocaleString()}</td>
                    <td>${r.baseSec.toFixed(2)}s</td>
                    <td>${r.targetSec.toFixed(2)}s</td>
                    <td class="${tCls}">${(r.timeVar >= 0 ? '+' : '') + r.timeVar.toFixed(2)}s</td>`;
                frag.appendChild(tr);
            });

            tbody.innerHTML = "";
            tbody.appendChild(frag);
            document.getElementById('compareTable').style.display = 'table';
        }

        function downloadComparisonCSV() {
            const min = parseFloat(document.getElementById('minDurFilter').value) || 0;
            const search = document.getElementById('nameFilter').value.toUpperCase();
            const rows = comparisonData
                .filter(r => r.targetSec >= min && r.func.toUpperCase().includes(search))
                .map(r => `"${r.domain}","${r.func}","${r.type}",${r.baseRec},${r.targetRec},${r.recVar},${r.baseSec.toFixed(2)},${r.targetSec.toFixed(2)},${r.timeVar.toFixed(2)}`);
            const csv = "Domain,Function,Type,Base Rec,Target Rec,Rec Var,Base Sec,Target Sec,Time Var\n" + rows.join("\n");
            const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })), download: 'Comparison_Report.csv' });
            a.click();
        }
    </script>
</body>

</html>
